  #badge {

  #station-count {

    background: #f8f9fa; border-bottom: 1px solid #eee;
  }

  /* ── Station cards ── */
  .station-card {
    padding: 11px 14px; border-bottom: 1px solid #eee;
    cursor: pointer; transition: background 0.15s;
  }
  .station-card:hover  { background: #eff6ff; }
  .station-card.active { background: #dbeafe; border-left: 3px solid #2563a8; }
  .station-name { font-weight: 600; font-size: 0.88rem; color: #1a3a5c; }
  .station-city { font-size: 0.78rem; color: #666; margin-top: 2px; }
  .station-addr { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .station-meta { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
  .tag { font-size: 0.68rem; padding: 2px 7px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .tag-octane { background: #dcfce7; color: #166534; }
  .tag-brand  { background: #e0e7ff; color: #3730a3; }
  .tag-phone  { background: #fef3c7; color: #92400e; }

  /* ── Popup ── */
  .leaflet-popup-content-wrapper { border-radius: 10px; }
  .popup-title { font-weight: 700; font-size: 1rem; color: #1a3a5c; margin-bottom: 4px; }
  .popup-row   { font-size: 0.85rem; color: #444; margin: 2px 0; }
  .popup-badge {
    display: inline-block; margin-top: 6px; padding: 3px 10px;
    background: #dcfce7; color: #166534; border-radius: 10px;
    font-size: 0.75rem; font-weight: 700;
  }
  .popup-badge.multi { background: #e0e7ff; color: #3730a3; }

  /* ── Mobile: bottom drawer ── */
  #list-toggle {
    display: none;
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #2563a8; color: white; border: none; border-radius: 24px;
    padding: 12px 24px; font-size: 0.95rem; font-weight: 700;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35); cursor: pointer; z-index: 2000;
    white-space: nowrap;
  }
  #drawer {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0;
    background: white; border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.2);
    z-index: 3000; max-height: 70vh;
    flex-direction: column; transition: transform 0.3s ease;
  }
  #drawer.open { display: flex; }
  #drawer-handle {
    text-align: center; padding: 10px 0 4px;
    cursor: pointer; flex-shrink: 0;
  }
  #drawer-handle::before {
    content: ''; display: inline-block;
    width: 40px; height: 4px; background: #ccc; border-radius: 2px;
  }
  #drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 14px 10px; flex-shrink: 0; border-bottom: 1px solid #eee;
  }

  #drawer-close {
    background: none; border: none; font-size: 1.3rem;
    color: #888; cursor: pointer; padding: 4px 8px;
  }
  #drawer-search {
    padding: 8px 14px; border-bottom: 1px solid #eee; flex-shrink: 0;
  }
  #drawer-search input {
    width: 100%; padding: 8px 12px; border: 1px solid #ccc;

  }

    #header h1 { font-size: 0.88rem; }

      <span class="tag tag-octane">${s.octane} Oct</span>
      <span class="tag tag-brand">${s.brand}</span>
      ${s.phone !== ' ' ? `<span class="tag tag-phone">${s.phone}</span>` : ''}
    </div>
  </div>`;
}

// Create markers and add to cluster group
stations.forEach((s, idx) => {
  const marker = L.marker([s.lat, s.lng], { icon: gasIcon })
    .bindPopup(buildPopup(s), { maxWidth: 280 });
  marker.on('click', () => focusStation(idx, true));
  markers.push(marker);
  clusterGroup.addLayer(marker);
});
map.addLayer(clusterGroup);

function renderList(filtered) {
  const html = filtered.map((s) => buildCard(s, stations.indexOf(s))).join('');
  document.getElementById('station-list').innerHTML = html;
  document.getElementById('drawer-list').innerHTML = html;
  const countText = `Showing ${filtered.length} of ${stations.length} stations`;
  document.getElementById('station-count').textContent = countText;
  document.getElementById('drawer-count').textContent = countText;
  document.getElementById('badge').textContent = `${stations.length} Stations`;
}

function focusStation(idx, fromMap = false) {
  if (activeCard) activeCard.classList.remove('active');
  const card = document.getElementById(`card-${idx}`);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    activeCard = card;
  }
  markers.forEach((m, i) => m.setIcon(i === idx ? gasIconActive : gasIcon));
  if (!fromMap) {
    closeDrawer();
    clusterGroup.zoomToShowLayer(markers[idx], () => markers[idx].openPopup());
  } else {
    markers[idx].openPopup();
  }
}

function filterStations(q) {
  const filtered = q
    ? stations.filter(s =>
        s.name.toLowerCase().includes(q) ||
        s.city.toLowerCase().includes(q) ||
        s.brand.toLowerCase().includes(q) ||
        s.addr.toLowerCase().includes(q))
    : stations;
  clusterGroup.clearLayers();
  stations.forEach((s, i) => {
    markers[i].setIcon(gasIcon);
    if (filtered.includes(s)) clusterGroup.addLayer(markers[i]);
  });
  renderList(filtered);
}

// Sync both search inputs
document.getElementById('search').addEventListener('input', function() {
  document.getElementById('search-mobile').value = this.value;
  filterStations(this.value.toLowerCase());
});
document.getElementById('search-mobile').addEventListener('input', function() {
  document.getElementById('search').value = this.value;
  filterStations(this.value.toLowerCase());
});

// Drawer functions
function openDrawer()  { document.getElementById('drawer').classList.add('open'); }
function closeDrawer() { document.getElementById('drawer').classList.remove('open'); }

// Close drawer on map tap
document.getElementById('map').addEventListener('click', closeDrawer);

renderList(stations);
</script>
</body>
</html>
